name: keep-alive

# Pings the deployed services so Render's free tier doesn't spin them down (15 min idle).
# Set two repo Variables (Settings → Secrets and variables → Actions → Variables):
#   BACKEND_URL   e.g. https://lms-backend-tzzz.onrender.com
#   FRONTEND_URL  e.g. https://lms-frontend-xw89.onrender.com
# If the variables are unset, the job no-ops (safe).
#
# BUDGET: Render free gives ~750 instance-hours/month across free services. Keeping BOTH
# services awake 24/7 would need ~1460 hrs/month and get suspended mid-month. So we only keep
# them warm during an active-hours window: every 5 min, 03:00–18:59 UTC (≈ 08:30–00:29 IST).
# That's ~2 × 16h × 8 days ≈ 256 instance-hours for a demo week — comfortably under budget.
# Outside the window the services sleep and cold-start (~50s) on the first request.
# After the demo, disable this workflow (Actions tab → keep-alive → ••• → Disable workflow).

on:
  schedule:
    - cron: "*/5 3-18 * * *" # every 5 min during 03:00–18:59 UTC (≈ 08:30–00:29 IST)
  workflow_dispatch: {} # allow manual "Run workflow" any time

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health + frontend
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          set +e
          ping() {
            [ -z "$1" ] && { echo "skip (unset)"; return; }
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$1")
            echo "$1 -> $code"
          }
          ping "${BACKEND_URL%/}/healthz"
          ping "${FRONTEND_URL%/}"
          # never fail the workflow on a cold-start timeout
          exit 0
