services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try{rs.status().ok}catch(e){rs.initiate();0}"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/salary-slips &&
      exit 0"

  backend:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/lms?replicaSet=rs0
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["4000:4000"]

  seed:
    build: .
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/lms?replicaSet=rs0
    depends_on:
      backend:
        condition: service_started
    command: ["bun", "dist/seed/seed.js"]
    restart: "no"

volumes:
  mongo-data:
  minio-data:
