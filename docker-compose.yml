services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes: ["mongo-data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try{rs.status().ok}catch(e){rs.initiate();0}"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks: [lms]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [lms]

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} || true"
    networks: [lms]

  backend:
    build: ./lms-backend
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["4000:4000"]
    networks: [lms]

  seed:
    build: ./lms-backend
    env_file: .env
    depends_on:
      backend:
        condition: service_started
    command: ["bun", "dist/seed/seed.js"]
    restart: "no"
    networks: [lms]

  frontend:
    build:
      context: ./lms-frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      API_URL_INTERNAL: ${API_URL_INTERNAL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      BACKEND_ORIGIN: ${BACKEND_ORIGIN}
    depends_on:
      backend:
        condition: service_started
    ports: ["3100:3000"]
    networks: [lms]

volumes:
  mongo-data:
  minio-data:

networks:
  lms:
